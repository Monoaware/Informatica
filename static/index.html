<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Informatica Agent</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0f1c;
  --panel: #121a2b;
  --accent: #7cff00;
  --accent-soft: rgba(124,255,0,0.15);
  --text: #e6f0ff;
  --muted: #7f9bb3;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #0f1b35, #05080f);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 820px;
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 20px;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding-bottom: 18px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.logo {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, #7cff00, #3cffc0);
  border-radius: 12px;
}

.header-text h1 {
  font-family: 'Space Mono', monospace;
  font-size: 18px;
  color: var(--accent);
}

.header-text p {
  font-size: 12px;
  color: var(--muted);
}

.status {
  margin-left: auto;
  font-size: 11px;
  padding: 6px 12px;
  border-radius: 20px;
  background: var(--accent-soft);
  color: var(--accent);
}

/* MESSAGES */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 25px 0;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.message {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.label {
  font-size: 11px;
  color: var(--muted);
}

.bubble {
  max-width: 70%;
  padding: 14px 16px;
  border-radius: 14px;
  line-height: 1.6;
  font-size: 14px;
}

.user .bubble {
  background: var(--accent);
  color: #000;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.agent .bubble {
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.06);
  border-bottom-left-radius: 4px;
}

/* EMPTY */
.empty {
  margin: auto;
  text-align: center;
  opacity: 0.5;
}

.empty p {
  font-size: 14px;
  color: var(--muted);
}

/* INPUT */
.input-area {
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 14px;
}

.input-row {
  display: flex;
  gap: 10px;
}

textarea {
  flex: 1;
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 12px;
  color: var(--text);
  resize: none;
  outline: none;
}

textarea:focus {
  border-color: var(--accent);
}

button {
  background: linear-gradient(135deg, #7cff00, #3cffc0);
  border: none;
  width: 50px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

</style>
</head>

<body>
<div class="app">

<header>
  <div class="logo"></div>
  <div class="header-text">
    <h1>Informatica Agent</h1>
    <p>Business analyst assistant powered by LangGraph</p>
  </div>
  <div class="status">LIVE</div>
</header>

<div class="messages" id="messages">
  <div class="empty" id="empty">
    <p>Ask about sales, revenue, or customer insights.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="What were total sales last month?"></textarea>
    <button onclick="send()">➤</button>
  </div>
</div>

</div>

<script>
const messages = document.getElementById("messages");
const input = document.getElementById("input");
const empty = document.getElementById("empty");

function addMessage(role, text) {
  if (empty) empty.remove();

  const div = document.createElement("div");
  div.className = "message " + role;

  const label = document.createElement("div");
  label.className = "label";
  label.textContent = role === "user" ? "You" : "Informatica Agent";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  div.appendChild(label);
  div.appendChild(bubble);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage("user", text);
  input.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();
  addMessage("agent", data.response);
}
</script>

</body>
</html>
